# Релиз по тегу: пушишь vX.Y.Z -> собираются desktop-бинари под win/mac/linux,
# переименовываются в Svitok-VERSION-platform.ext, считается SHA256SUMS.txt и всё
# кладётся в ЧЕРНОВИК релиза с описанием из аннотации тега. Ты добавляешь
# подписанный Android APK (ключ держим локально, не в CI) и публикуешь.
# Публичный репозиторий -> раннеры бесплатны, включая macOS.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Install frontend dependencies
        run: npm install
        working-directory: app

      - id: tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          args: ${{ matrix.args }}

      # Переименовываем бандлы в Svitok-VERSION-platform.ext и складываем в dist/
      - name: Rename artifacts
        shell: bash
        run: |
          version=$(jq -r .version app/src-tauri/tauri.conf.json)
          mkdir -p dist
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | while read -r p; do
            case "$p" in
              *.dmg)      cp "$p" "dist/Svitok-$version-macos.dmg" ;;
              *.deb)      cp "$p" "dist/Svitok-$version-linux.deb" ;;
              *.AppImage) cp "$p" "dist/Svitok-$version-linux.AppImage" ;;
              *-setup.exe) cp "$p" "dist/Svitok-$version-windows-setup.exe" ;;
            esac
          done
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect and checksum
        run: |
          mkdir -p out
          find artifacts -type f -exec cp {} out/ \;
          cd out
          sha256sum * > SHA256SUMS.txt
          echo "--- artifacts ---"
          cat SHA256SUMS.txt

      - name: Release notes from tag annotation
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            git tag -l --format='%(contents)' "${{ github.ref_name }}" > notes.md
          fi
          if [ ! -s notes.md ]; then
            printf 'Desktop builds below, with SHA256SUMS.txt.\n\nBuild the signed Android APK locally, add it here, append its checksum to SHA256SUMS.txt, finalize these notes, then publish.\n' > notes.md
          fi
          cat notes.md

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Svitok ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}"
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          body_path: notes.md
          files: out/*
