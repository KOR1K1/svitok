# Релиз по тегу: пушишь vX.Y.Z -> собираются desktop-бинари под win/mac/linux,
# переименовываются в Svitok-VERSION-platform.ext, считается SHA256SUMS.txt и всё
# кладётся в ЧЕРНОВИК релиза с описанием из аннотации тега. Ты добавляешь
# подписанный Android APK (ключ держим локально, не в CI) и публикуешь.
# Публичный репозиторий -> раннеры бесплатны, включая macOS.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # версия тулчейна закреплена в rust-toolchain.toml - здесь она же,
      # чтобы action поставил нужную сразу, а не stable с докачкой
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      # Воспроизводимая сборка (docs/REPRODUCIBLE.md): пути ремапятся в /build и
      # /cargo, чтобы бинарь не зависел от каталога сборки; на Windows /Brepro
      # заменяет таймстамп PE-заголовка детерминированным хэшем.
      - name: Deterministic build flags
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ws=$(cygpath -w "$GITHUB_WORKSPACE")
            cargo_home=$(cygpath -w "$HOME/.cargo")
            echo "RUSTFLAGS=--remap-path-prefix=$ws=/build --remap-path-prefix=$cargo_home=/cargo -Clink-arg=/Brepro" >> "$GITHUB_ENV"
          else
            echo "RUSTFLAGS=--remap-path-prefix=$GITHUB_WORKSPACE=/build --remap-path-prefix=$HOME/.cargo=/cargo" >> "$GITHUB_ENV"
          fi

      - name: Install frontend dependencies
        run: npm install
        working-directory: app

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          args: ${{ matrix.args }}

      # Переименовываем бандлы в Svitok-VERSION-platform.ext и складываем в dist/.
      # Ищем через find (форвард-слеши, работает и в git bash на Windows), а не
      # через artifactPaths - там на Windows backslash-пути, ломающие bash.
      - name: Rename artifacts
        shell: bash
        run: |
          version=$(jq -r .version app/src-tauri/tauri.conf.json)
          mkdir -p dist
          find target -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' -o -name '*-setup.exe' \) | while read -r p; do
            case "$p" in
              *.dmg)       cp "$p" "dist/Svitok-$version-macos.dmg" ;;
              *.deb)       cp "$p" "dist/Svitok-$version-linux.deb" ;;
              *.AppImage)  cp "$p" "dist/Svitok-$version-linux.AppImage" ;;
              *-setup.exe) cp "$p" "dist/Svitok-$version-windows-setup.exe" ;;
            esac
          done
          # портативный exe - то, что сверяют при воспроизводимой сборке:
          # инсталлятор NSIS пакует таймстампы и побайтово не сходится
          if [ -f target/release/svitok-app.exe ]; then
            cp target/release/svitok-app.exe "dist/Svitok-$version-windows.exe"
          fi
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect and checksum
        run: |
          mkdir -p out
          find artifacts -type f -exec cp {} out/ \;
          cd out
          sha256sum * > SHA256SUMS.txt
          echo "--- artifacts ---"
          cat SHA256SUMS.txt

      - name: Release notes from tag annotation
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            git tag -l --format='%(contents)' "${{ github.ref_name }}" > notes.md
          fi
          if [ ! -s notes.md ]; then
            printf 'Desktop builds below, with SHA256SUMS.txt.\n\nBuild the signed Android APK locally, add it here, append its checksum to SHA256SUMS.txt, finalize these notes, then publish.\n' > notes.md
          fi
          cat notes.md

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Svitok ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}"
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          body_path: notes.md
          files: out/*
